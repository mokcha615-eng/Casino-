<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mokhtar's Space</title>
  <meta name="description" content="A list of single-file HTML applications deployed by mokhtar." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base:          #0d0f14;
      --bg-surface:       #13161e;
      --bg-elevated:      #1a1e28;
      --glass-bg:         rgba(255,255,255,0.04);
      --glass-border:     rgba(255,255,255,0.09);
      --glass-hover:      rgba(255,255,255,0.07);
      --accent:           #7c6af7;
      --accent-light:     #a499ff;
      --accent-glow:      rgba(124,106,247,0.25);
      --text-primary:     #f0f2f8;
      --text-secondary:   #8a8fa8;
      --radius-sm:        6px;
      --radius-md:        12px;
      --radius-lg:        18px;
      --shadow-card:      0 4px 24px rgba(0,0,0,0.4);
      --shadow-glow:      0 0 40px var(--accent-glow);
      --font-sans:        'Inter', system-ui, sans-serif;
      --transition:       150ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.light-theme {
      --bg-base:          #f4f6f8;
      --bg-surface:       #ffffff;
      --bg-elevated:      #ffffff;
      --glass-bg:         rgba(0,0,0,0.03);
      --glass-border:     rgba(0,0,0,0.08);
      --glass-hover:      rgba(0,0,0,0.06);
      --accent:           #6350e5;
      --accent-light:     #4f3cc9;
      --accent-glow:      rgba(99,80,229,0.15);
      --text-primary:     #111827;
      --text-secondary:   #4b5563;
      --shadow-card:      0 4px 20px rgba(0,0,0,0.05);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.5;
      transition: background-color var(--transition), color var(--transition);
      padding: 2.5rem 1.5rem;
    }

    .container {
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
      gap: 1rem;
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    p.subtitle {
      color: var(--text-secondary);
      margin-top: 0.25rem;
      font-size: 1rem;
    }

    .theme-btn {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      cursor: pointer;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
    }

    .theme-btn:hover {
      background: var(--glass-hover);
      border-color: rgba(255,255,255,0.15);
      color: var(--text-primary);
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .app-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 1.75rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      position: relative;
      overflow: hidden;
      transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
      box-shadow: var(--shadow-card);
    }

    .app-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: var(--app-color, var(--accent));
      opacity: 0.7;
    }

    .app-card:hover {
      border-color: var(--app-color-glow, var(--accent-light));
      transform: translateY(-4px);
      box-shadow: 0 12px 30px var(--app-glow-shadow, var(--accent-glow));
    }

    .app-emoji {
      font-size: 2.5rem;
      margin-bottom: 0.25rem;
    }

    .app-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .app-slug {
      font-family: monospace;
      font-size: 0.8rem;
      color: var(--text-secondary);
      background: var(--glass-bg);
      padding: 0.2rem 0.5rem;
      border-radius: var(--radius-sm);
      align-self: flex-start;
      margin-top: auto;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      max-width: 500px;
      margin: 2rem auto;
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    footer {
      margin-top: auto;
      padding-top: 4rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-secondary);
      opacity: 0.8;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>mokhtar's Space</h1>
        <p class="subtitle">
          7 applications available
        </p>
      </div>
      <button class="theme-btn" id="theme-toggle" aria-label="Toggle Theme">☀️</button>
    </header>

    
    <div class="app-grid">
      
      <a href="./test/" class="app-card" >
        <div class="app-emoji">🚀</div>
        <div class="app-title">test</div>
        <div class="app-slug">/test</div>
      </a>
      
      <a href="./auto/" class="app-card" >
        <div class="app-emoji">🌟</div>
        <div class="app-title">auto</div>
        <div class="app-slug">/auto</div>
      </a>
      
      <a href="./headball/" class="app-card" >
        <div class="app-emoji">🧩</div>
        <div class="app-title">headball</div>
        <div class="app-slug">/headball</div>
      </a>
      
      <a href="./bombe/" class="app-card" >
        <div class="app-emoji">🦄</div>
        <div class="app-title">bombe</div>
        <div class="app-slug">/bombe</div>
      </a>
      
      <a href="./casino/" class="app-card" >
        <div class="app-emoji">🎨</div>
        <div class="app-title">Casino</div>
        <div class="app-slug">/casino</div>
      </a>
      
      <a href="./xjeij/" class="app-card" >
        <div class="app-emoji">🏆</div>
        <div class="app-title">roboter-baller-3d.html</div>
        <div class="app-slug">/xjeij</div>
      </a>
      
      <a href="./e3/" class="app-card" >
        <div class="app-emoji">✨</div>
        <div class="app-title">auto</div>
        <div class="app-slug">/e3</div>
      </a>
      
    </div>
    

    <footer>
      Powered by <a href="https://github.com/thomasmarwitz/ohg-deploy" target="_blank" rel="noopener">Deploy OHG</a>
    </footer>
  </div>

  <script>
    const themeBtn = document.getElementById('theme-toggle');
    
    // Check initial preference
    if (localStorage.getItem('theme') === 'light' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: light)').matches)) {
      document.body.classList.add('light-theme');
      themeBtn.textContent = '🌙';
    } else {
      themeBtn.textContent = '☀️';
    }

    themeBtn.addEventListener('click', () => {
      document.body.classList.toggle('light-theme');
      const isLight = document.body.classList.contains('light-theme');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      themeBtn.textContent = isLight ? '🌙' : '☀️';
    });
  </script>
</body>
</html>

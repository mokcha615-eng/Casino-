<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<style>
body { margin:0; overflow:hidden; background:#000; font-family:Arial; }

#ui {
    position:absolute;
    top:10px; left:10px;
    color:white;
    z-index:10;
    font-size:18px;
}

#gameOver {
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,0.7);
    color:white;
    font-size:40px;
}

button {
    font-size:20px;
    padding:10px 20px;
    margin-top:20px;
}

/* Mobile Controls */
#controls {
    position:absolute;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 30px;
    z-index:10;
}

.ctrl {
    width:80px;
    height:80px;
    background:rgba(255,255,255,0.15);
    border:2px solid white;
    border-radius:15px;
}
</style>

<body>

<div id="ui">
Score: <span id="score">0</span><br>
Highscore: <span id="highscore">0</span>
</div>

<div id="gameOver">
💥 Crash!
<button onclick="location.reload()">Neustart</button>
</div>

<div id="controls">
<div class="ctrl" id="left"></div>
<div class="ctrl" id="right"></div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(10,20,10);
scene.add(sun);

// ================= ROAD (CURVED) =================
const road = new THREE.Mesh(
    new THREE.PlaneGeometry(200, 2000, 20, 200),
    new THREE.MeshStandardMaterial({ color:0x333333 })
);
road.rotation.x = -Math.PI/2;
scene.add(road);

// ================= PLAYER CAR =================
const car = new THREE.Mesh(
    new THREE.BoxGeometry(1,0.5,2),
    new THREE.MeshStandardMaterial({ color:0xff0000 })
);
car.position.y = 0.3;
scene.add(car);

// ================= OBJECTS =================
const obstacles = [];
for(let i=0;i<30;i++){
    const o = new THREE.Mesh(
        new THREE.BoxGeometry(1,1,1),
        new THREE.MeshStandardMaterial({color:0x0000ff})
    );
    o.position.set((Math.random()*6)-3,0.5,-i*20);
    scene.add(o);
    obstacles.push(o);
}

// ================= INPUT =================
const keys = {};
window.addEventListener("keydown",e=>keys[e.code]=true);
window.addEventListener("keyup",e=>keys[e.code]=false);

// MOBILE
let left=false,right=false;
document.getElementById("left").ontouchstart=()=>left=true;
document.getElementById("left").ontouchend=()=>left=false;
document.getElementById("right").ontouchstart=()=>right=true;
document.getElementById("right").ontouchend=()=>right=false;

// ================= GAME =================
let speed = 0;
let score = 0;
let drift = 0;
let gameOver = false;

let high = localStorage.getItem("highscore")||0;
document.getElementById("highscore").innerText = high;

// ================= COLLISION =================
function hit(a,b){
    return Math.abs(a.position.x-b.position.x)<1 &&
           Math.abs(a.position.z-b.position.z)<2;
}

// ================= EXPLOSION =================
function explosion(x,z){
    const parts=[];
    for(let i=0;i<20;i++){
        const p=new THREE.Mesh(
            new THREE.SphereGeometry(0.1),
            new THREE.MeshBasicMaterial({color:0xffaa00})
        );
        p.position.set(x,0.5,z);
        scene.add(p);
        parts.push({mesh:p, vx:(Math.random()-0.5), vz:(Math.random()-0.5)});
    }

    let t=0;
    function anim(){
        t++;
        parts.forEach(p=>{
            p.mesh.position.x+=p.vx;
            p.mesh.position.z+=p.vz;
        });
        if(t<30) requestAnimationFrame(anim);
    }
    anim();
}

// ================= LOOP =================
function animate(){
    requestAnimationFrame(animate);
    if(gameOver) return;

    // SPEED
    if(keys["ArrowUp"]) speed+=0.01;
    if(keys["ArrowDown"]) speed-=0.02;

    speed*=0.98;
    speed=Math.max(0,Math.min(speed,1));

    // DRIFT SYSTEM
    let steer=0;
    if(keys["ArrowLeft"]||left) steer=-1;
    if(keys["ArrowRight"]||right) steer=1;

    drift += (steer*0.08 - drift)*0.1;
    car.position.x += drift;
    car.position.x=Math.max(-4,Math.min(4,car.position.x));

    car.position.z -= speed;

    // CAMERA FOLLOW
    camera.position.set(car.position.x,2,car.position.z+6);
    camera.lookAt(car.position.x,0.5,car.position.z-5);

    // CURVED ROAD FEELING
    road.position.x = Math.sin(car.position.z*0.01)*2;

    // OBSTACLES
    for(const o of obstacles){
        o.position.z += 0.3;

        if(hit(car,o)){
            explosion(car.position.x,car.position.z);
            gameOver=true;
            document.getElementById("gameOver").style.display="flex";
            if(score>high) localStorage.setItem("highscore",Math.floor(score));
        }

        if(o.position.z>car.position.z+10){
            o.position.z=car.position.z-300;
            o.position.x=(Math.random()*6)-3;
        }
    }

    // SCORE
    score += speed*2;
    document.getElementById("score").innerText=Math.floor(score);

    renderer.render(scene,camera);
}

animate();

// RESIZE
addEventListener("resize",()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
